<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-recaptcha-hybrid demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px;
        margin-top: 16px;
      }
      button {
        padding: 8px 16px;
        border-radius: 4px;
        border: 1px solid #555;
        cursor: pointer;
        margin-right: 8px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .primary {
        background: #1a73e8;
        color: white;
        border-color: #1a73e8;
      }
      pre {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .status {
        font-size: 13px;
        color: #555;
        margin-top: 8px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
